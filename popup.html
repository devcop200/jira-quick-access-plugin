<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <img src="icons/icon48.png" class="header-icon" alt="J" />
      <span>Jira</span>
      <span class="user-label" id="user-label"></span>
    </div>
    <div id="tt-chips"></div>
    <div class="header-right">
      <button class="icon-btn ci-create-btn" id="create-btn" title="Create Issue">+</button>
      <button class="icon-btn" id="refresh-btn" title="Refresh">↻</button>
      <button class="icon-btn" id="theme-btn" title="Toggle theme">☾</button>
      <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
    </div>
  </header>

  <div id="create-issue-panel" class="hidden">
    <div class="ci-form-header">
      <span class="ci-form-title">Create Issue</span>
      <button class="icon-btn ci-icon-btn-dark" id="ci-close-btn" title="Close">×</button>
    </div>
    <div class="ci-form-body">
      <div class="ci-row">
        <label class="ci-label" for="ci-project">Project *</label>
        <select id="ci-project" class="ci-select"></select>
      </div>
      <div class="ci-row">
        <label class="ci-label" for="ci-issuetype">Issue Type *</label>
        <select id="ci-issuetype" class="ci-select"></select>
      </div>
      <div class="ci-row">
        <label class="ci-label" for="ci-summary">Summary *</label>
        <input id="ci-summary" class="ci-input" type="text" placeholder="Short, descriptive title" />
      </div>
      <div class="ci-row">
        <label class="ci-label" for="ci-description">Description</label>
        <textarea id="ci-description" class="ci-textarea" rows="3" placeholder="Describe the issue…"></textarea>
      </div>
      <div class="ci-row ci-row-dd">
        <label class="ci-label">Labels</label>
        <div class="ci-tags-wrap" id="ci-labels-wrap">
          <div class="ci-tags-chips" id="ci-labels-chips"></div>
          <input id="ci-labels-input" class="ci-tags-text" type="text" placeholder="Add label…" autocomplete="off" />
        </div>
        <div class="ci-dropdown" id="ci-labels-dropdown"></div>
      </div>
      <div class="ci-row ci-row-dd">
        <label class="ci-label" for="ci-assignee-input">Assignee</label>
        <input id="ci-assignee-input" class="ci-input" type="text" placeholder="Search user…" autocomplete="off" />
        <input id="ci-assignee-name" type="hidden" />
        <div class="ci-dropdown" id="ci-assignee-dropdown"></div>
      </div>
      <button class="ci-advanced-btn" id="ci-advanced-btn">Advanced ▾</button>
      <div class="ci-advanced-body" id="ci-advanced-body">
        <div class="ci-row">
          <label class="ci-label" for="ci-estimate">Estimate</label>
          <input id="ci-estimate" class="ci-input ci-input-half" type="text" placeholder="e.g. 2h 30m" />
        </div>
        <div class="ci-row">
          <label class="ci-label" for="ci-remaining">Remaining Estimate</label>
          <input id="ci-remaining" class="ci-input ci-input-half" type="text" placeholder="e.g. 1h" />
        </div>
        <div class="ci-row">
          <label class="ci-label">Linked Issues</label>
          <div id="ci-links-list"></div>
          <button class="ci-add-link-btn" id="ci-add-link-btn">+ Add link</button>
        </div>
      </div>
      <div id="ci-error" class="ci-error hidden"></div>
      <div class="ci-footer">
        <button class="ci-btn-secondary" id="ci-cancel-btn">Cancel</button>
        <button class="ci-btn-primary" id="ci-submit-btn">Create</button>
      </div>
    </div>
  </div>

  <div id="not-configured" class="hidden">
    <p>No Jira connection configured.<br/>Add your Jira URL and Personal Access Token to get started.</p>
    <button class="btn-primary" id="go-settings-btn">Open Settings</button>
  </div>

  <div id="main-content" class="hidden">
    <div class="tabs">
      <button class="tab active" data-tab="my-issues">My Issues</button>
      <button class="tab" data-tab="search">Search</button>
      <button class="tab" data-tab="logged-work">Logged Work</button>
      <button class="tab" data-tab="watching">Watching</button>
      <button class="tab" data-tab="notifications">Notifications<span class="tab-badge hidden" id="notifications-count"></span></button>
    </div>

    <div id="my-issues-panel" class="panel">
      <div id="filter-bar" class="hidden"></div>
      <div id="my-issues-search-box">
        <input type="text" id="my-issues-search" placeholder="Search by ID or summary…" autocomplete="off" />
      </div>
      <div id="tt-section" class="hidden"></div>
      <div id="tt-my-tasks-header" class="tt-my-tasks-label hidden">My Tasks</div>
      <div id="issues-container"></div>
    </div>

    <div id="search-panel" class="panel hidden">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search issues… (press Enter)" autocomplete="off" />
      </div>
      <div id="search-results"></div>
    </div>

    <div id="logged-work-panel" class="panel hidden">
      <div class="period-selector">
        <button class="period-btn active" data-period="today">Today</button>
        <button class="period-btn" data-period="week">Week</button>
        <button class="period-btn" data-period="month">Month</button>
        <button class="period-btn" data-period="custom">Custom</button>
      </div>
      <div id="custom-dates" class="hidden">
        <div class="date-range-row">
          <input type="date" id="date-from" />
          <span class="date-sep">–</span>
          <input type="date" id="date-to" />
          <button class="btn-go" id="apply-custom-dates">Go</button>
        </div>
      </div>
      <div id="work-chart"></div>
      <div id="work-legend"></div>
    </div>

    <div id="watching-panel" class="panel hidden">
      <div id="watching-container"></div>
    </div>

    <div id="notifications-panel" class="panel hidden">
      <div id="notifications-container"></div>
    </div>

  </div>

  <div id="tt-overflow-panel" class="hidden"></div>
  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
